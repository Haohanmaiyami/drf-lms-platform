
services:
  web:
    restart: unless-stopped
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
      - static_volume:/code/static
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0

  db:
    restart: unless-stopped
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env

  redis:
    restart: unless-stopped
    image: redis:7
    ports:
      - "6379:6379"

  celery:
    restart: unless-stopped
    build: .
    command: celery -A config worker -l info
    depends_on:
      - db
      - redis
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0

  celery-beat:
    restart: unless-stopped
    build: .
    command: sh -c "sleep 10 && celery -A config beat -l info"
    depends_on:
      - db
      - redis
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      DATABASE_HOST: db
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
  static_volume:
